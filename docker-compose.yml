# 로컬 개발용 PostgreSQL. 포트는 dev-ports 환경변수 경유(하드코딩 금지).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopflow}
      POSTGRES_USER: ${POSTGRES_USER:-shopflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopflow}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - shopflow_pgdata:/var/lib/postgresql/data

volumes:
  shopflow_pgdata:
