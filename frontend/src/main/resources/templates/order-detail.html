<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common('주문 상세')}"></head>
<body>
<div class="page-shell">
  <nav th:replace="~{fragments/nav :: nav}"></nav>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px">
      <div style="display:flex;flex-direction:column;gap:6px">
        <div class="serif" style="font-size:30px">주문 상세</div>
        <div class="mono muted" style="font-size:12px" th:text="'ORD-' + ${order.id}"></div>
      </div>
      <span th:class="'chip chip-' + ${order.status}" th:text="${order.status}"></span>
    </div>

    <div class="info-banner accent" style="margin-bottom:22px">
      <span>⊞</span>
      <span th:text="'이 주문은 판매자 ' + ${#lists.size(order.subOrders)} + '곳의 상품을 포함해 하위주문 ' + ${#lists.size(order.subOrders)} + '개로 분리되었습니다. 배송·정산은 각각 독립적으로 추적됩니다.'"></span>
    </div>

    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="card" th:each="s : ${order.subOrders}">
        <div style="padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-light);background:#FBF9F5">
          <div style="display:flex;align-items:center;gap:8px;font-size:13.5px">
            <span class="muted">🏪</span><b th:text="${s.sellerStoreName}"></b>
            <span class="mono faint" style="font-size:11px" th:text="'SUB-' + ${s.subOrderId}"></span>
          </div>
          <span th:class="'chip chip-' + ${s.deliveryStatus}" th:text="${s.deliveryStatus}"></span>
        </div>
        <div style="padding:14px 22px;display:flex;justify-content:space-between;font-size:13px">
          <span class="muted">소계</span>
          <span style="font-weight:600" th:text="${#numbers.formatInteger(s.subtotalKrw,1,'COMMA')} + '원'"></span>
        </div>
        <div class="timeline">
          <div class="step">
            <div class="dot done"></div>
            <div class="label">결제완료</div>
          </div>
          <div th:class="${s.deliveryStatus == 'PENDING'} ? 'line' : 'line on'"></div>
          <div class="step">
            <div th:class="${s.deliveryStatus == 'PENDING'} ? 'dot pending' : (${s.deliveryStatus == 'SHIPPING'} ? 'dot active' : 'dot doneGreen')"></div>
            <div class="label" th:text="'배송중'"
                 th:style="${s.deliveryStatus == 'PENDING'} ? 'color:var(--text-faint)' : (${s.deliveryStatus == 'SHIPPING'} ? 'color:var(--accent)' : 'color:var(--success)')"></div>
          </div>
          <div th:class="${s.deliveryStatus == 'DELIVERED'} ? 'line green' : 'line'"></div>
          <div class="step">
            <div th:class="${s.deliveryStatus == 'DELIVERED'} ? 'dot doneGreen' : 'dot pending'"></div>
            <div class="label" th:text="'배송완료'"
                 th:style="${s.deliveryStatus == 'DELIVERED'} ? 'color:var(--success)' : 'color:var(--text-faint)'"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
