<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common('판매자 등록')}"></head>
<body>
<div class="page-shell">
  <nav th:replace="~{fragments/nav :: nav}"></nav>
  <div class="container-narrow" style="padding-top:56px">
    <div style="text-align:center;display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
      <div class="serif" style="font-size:30px">판매자 등록</div>
      <div class="muted" style="font-size:13.5px">ShopFlow에 입점해 상품을 판매하세요</div>
    </div>
    <div th:if="${errorMessage}" class="form-error" th:text="${errorMessage}"></div>
    <form th:action="@{/seller/register}" method="post">
      <div class="form-field">
        <label>판매자 유형</label>
        <select name="sellerType" required>
          <option value="INDIVIDUAL">개인</option>
          <option value="SOLE_PROPRIETOR">개인사업자</option>
          <option value="CORPORATION">법인</option>
        </select>
      </div>
      <div class="form-field">
        <label>스토어 이름</label>
        <input type="text" name="storeName" th:value="${storeName}" required/>
      </div>
      <div class="form-field">
        <label>사업자등록번호 (개인사업자·법인 필수)</label>
        <input type="text" name="businessRegistrationNumber" placeholder="000-00-00000"/>
      </div>
      <div class="form-field">
        <label>대표자명 (개인사업자·법인 필수)</label>
        <input type="text" name="representativeName"/>
      </div>
      <div class="form-field">
        <label>연락처</label>
        <input type="text" name="contactPhone"/>
      </div>
      <div class="form-field">
        <label>연락 이메일</label>
        <input type="email" name="contactEmail"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">등록하기</button>
    </form>
  </div>
</div>
</body>
</html>
