<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common('상품 등록')}"></head>
<body>
<div class="page-shell">
  <nav th:replace="~{fragments/nav :: nav}"></nav>
  <div class="container-narrow">
    <div class="serif" style="font-size:26px;margin-bottom:20px">새 상품 등록</div>
    <div th:if="${errorMessage}" class="form-error" th:text="${errorMessage}"></div>
    <form th:action="@{/seller/products}" method="post">
      <div class="form-field"><label>상품명</label><input type="text" name="name" required/></div>
      <div class="form-field"><label>설명</label><textarea name="description" rows="3"></textarea></div>
      <div class="form-field"><label>가격(원)</label><input type="number" name="priceKrw" min="0" required/></div>
      <div class="form-field"><label>재고 수량</label><input type="number" name="stock" min="0" required/></div>
      <div class="form-field"><label>이미지 URL (선택)</label><input type="text" name="imageUrl"/></div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary">등록</button>
        <a th:href="@{/seller/products}" class="btn btn-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
