<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common('내 상품')}"></head>
<body>
<div class="page-shell">
  <nav th:replace="~{fragments/nav :: nav}"></nav>
  <div class="container">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <div class="serif" style="font-size:30px">판매자 센터</div>
      <span style="font-size:11px;padding:3px 9px;border-radius:999px;background:var(--text-primary);color:var(--bg-surface)">상품 관리</span>
    </div>
    <div th:replace="~{fragments/seller-subnav :: subnav}"></div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <a th:href="@{/seller/products/new}" class="btn btn-primary btn-sm">+ 새 상품 등록</a>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="empty-state">등록된 상품이 없어요.</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="card" th:each="p : ${products}" style="padding:16px 20px;display:flex;align-items:center;gap:16px">
        <div style="width:52px;height:64px;background:repeating-linear-gradient(45deg,#E7E1D6 0 8px,#EFEAE0 8px 16px);overflow:hidden">
          <img th:if="${p.imageUrl}" th:src="${p.imageUrl}" alt="" style="width:100%;height:100%;object-fit:cover;display:block"/>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <div th:text="${p.name}"></div>
          <div class="muted" style="font-size:12px" th:text="${#numbers.formatInteger(p.priceKrw,1,'COMMA')} + '원'"></div>
        </div>
        <span th:class="'chip chip-' + ${p.status}" th:text="${p.status == 'ON_SALE'} ? '판매중' : '판매중지'"></span>
        <a th:href="@{/seller/products/{id}/edit(id=${p.id})}" class="btn btn-secondary btn-sm">관리</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
