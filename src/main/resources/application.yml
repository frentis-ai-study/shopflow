# ShopFlow 백엔드 설정 — 포트·DB·시크릿은 환경변수로 외부화(dev-ports 규칙, 원칙 II)
server:
  port: ${BACKEND_PORT:18000}

spring:
  application:
    name: shopflow
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:15432}/${POSTGRES_DB:shopflow}
    username: ${POSTGRES_USER:shopflow}
    password: ${POSTGRES_PASSWORD:shopflow}
  jpa:
    hibernate:
      # 스키마는 Flyway가 관리. 엔티티-스키마 정합성만 검증한다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    rest:
      # 백엔드 REST 리소스는 /api 하위로 격리(ADR-0011, 프론트 SSR 경로와 충돌 방지)
      base-path: /api
      # 기본 노출을 명시적으로 제한(RestExposureConfig에서 화이트리스트)
      detection-strategy: annotated

logging:
  level:
    root: INFO
    com.shopflow: DEBUG
